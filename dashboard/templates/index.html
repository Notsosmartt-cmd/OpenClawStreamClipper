<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw — Stream Clipper</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo-mark">
            <svg viewBox="0 0 15 15" fill="none">
                <path d="M3.5 2.5C3.5 2.5 5 4 7.5 4C10 4 11.5 2.5 11.5 2.5" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M2 7C3.5 5.5 5.5 4.5 7.5 4.5C9.5 4.5 11.5 5.5 13 7" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
                <circle cx="7.5" cy="10" r="2.5" fill="white"/>
            </svg>
        </div>
        <div class="logo-text">
            <span class="logo-name">OpenClaw</span>
            <span class="logo-sub">Stream Clipper</span>
        </div>
    </div>
    <div class="header-right">
        <span id="docker-badge" class="badge badge-gray" style="display: none;"></span>
        <div id="status-badge" class="status-badge">
            <div class="status-dot"></div>
            <span id="status-label">Idle</span>
        </div>
    </div>
</header>

<div class="dashboard">

    <!-- VOD Library -->
    <div class="panel" style="grid-column: 1 / -1">
        <div class="panel-header">
            <span class="panel-title">VOD Library</span>
            <button id="btn-refresh-vods" class="btn-ghost btn-sm">Refresh</button>
        </div>
        <div class="panel-body" style="padding: 0;">
            <table class="vod-table">
                <thead>
                    <tr>
                        <th style="width: 40px; text-align: center;">
                            <input type="checkbox" id="vod-select-all" title="Select all VODs"
                                   onchange="toggleAllVods(this.checked)">
                        </th>
                        <th>VOD Name</th>
                        <th>Size</th>
                        <th>Duration</th>
                        <th>Status</th>
                        <th>Transcription</th>
                    </tr>
                </thead>
                <tbody id="vod-tbody">
                    <tr><td colspan="6" class="empty-state">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Clip Controls -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Clip Controls</span>
        </div>
        <div class="panel-body">
            <div class="controls">
                <div class="control-group">
                    <label class="field-label">Style</label>
                    <select id="sel-style">
                        <option value="auto">Auto</option>
                        <option value="funny">Funny</option>
                        <option value="hype">Hype</option>
                        <option value="emotional">Emotional</option>
                        <option value="hot_take">Hot Take</option>
                        <option value="storytime">Storytime</option>
                        <option value="reactive">Reactive</option>
                        <option value="controversial">Controversial</option>
                        <option value="dancing">Dancing</option>
                        <option value="variety">Variety</option>
                    </select>
                </div>
                <div class="control-group">
                    <label class="field-label">Type Hint</label>
                    <input type="text" id="inp-type" placeholder="gaming, irl…" style="width: 120px;">
                </div>
                <div class="control-group">
                    <label class="field-label">Speed</label>
                    <select id="sel-speed">
                        <option value="1.0">1×</option>
                        <option value="1.1">1.1×</option>
                        <option value="1.25">1.25×</option>
                        <option value="1.5">1.5×</option>
                        <option value="2.0">2×</option>
                    </select>
                </div>
                <div class="control-group" title="Pass B dead-chunk gate. Higher modes skip the LLM on chunks judged 'dead' (no clip-worthy signal), saving time but risking false negatives (a missed clip). Ordered safest→fastest. 'sample' = multi + a 1-in-N pass-through, so it skips a subset of multi → slower but safer.">
                    <label class="field-label">Pass B Gate</label>
                    <select id="sel-passb-gate">
                        <option value="off" selected>Off — safest</option>
                        <option value="sample">Sample — ~10% faster</option>
                        <option value="multi">Multi — ~22% faster</option>
                        <option value="strict">Strict — ~28% faster</option>
                    </select>
                </div>
            </div>

            <hr class="section-divider">

            <div class="checkbox-group">
                <input type="checkbox" id="chk-hook-caption" checked>
                <label for="chk-hook-caption">Hook caption</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-captions" checked>
                <label for="chk-captions">Captions</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-force">
                <label for="chk-force">Force reprocess</label>
            </div>

            <div class="btn-row">
                <button id="btn-clip" class="btn-primary" disabled>Clip Selected</button>
                <button id="btn-clip-all" class="btn-primary">Clip All</button>
                <button id="btn-stop" class="btn-danger" style="display: none;">Stop</button>
            </div>
        </div>
    </div>

    <!-- Originality & Render -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Originality &amp; Render</span>
        </div>
        <div class="panel-body">
            <div class="controls" id="originality-controls">
                <div class="control-group">
                    <label class="field-label">Framing</label>
                    <select id="sel-framing" onchange="onOriginalityChange()" title="Blur-fill: 9:16 with blurred sidebars (safe default). Camera pan: face-tracking virtual camera; silently falls back to blur-fill if no faces are detected.">
                        <option value="blur_fill" selected>Blur-fill</option>
                        <option value="camera_pan">Camera pan</option>
                    </select>
                </div>
            </div>

            <hr class="section-divider">

            <div class="checkbox-group">
                <input type="checkbox" id="chk-originality" checked onchange="onOriginalityChange()">
                <label for="chk-originality" title="Per-clip random blur, color, mirror, hook and subtitle style.">Per-clip randomization</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-narrative" checked onchange="onOriginalityChange()">
                <label for="chk-narrative" title="Merge adjacent storytime/emotional/hot_take moments into one long clip.">Narrative merge</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-stitch" onchange="onOriginalityChange()">
                <label for="chk-stitch" title="Bundle 3-4 short moments into one multi-segment post.">Stitch short clips</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-arc-stitch" onchange="onOriginalityChange()">
                <label for="chk-arc-stitch" title="Render A1/M3 setup→payoff arcs as a 2-part clip (short 'Earlier:' setup snippet jump-cut to the payoff). Also loosens the arc-guarantee so the top arc reaches the final selection.">Stitch arcs</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-flash-cuts" onchange="onOriginalityChange()">
                <label for="chk-flash-cuts" title="White-flash transition beats layered on clips for engagement (deterministic cadence + any model-picked beats). Pattern-interrupt — no content removed.">White-flash transitions</label>
            </div>
            <div class="control-group" style="margin-top: 6px;">
                <label class="field-label" title="Jump-cut to the payoff with a white fade by DROPPING dead air/rambling. 'Silence' is safe (drops only pauses); 'Smart' adds LLM-inferred cuts of filler (needs AI editing profiles / vision). Captions stay in sync — the cut is applied to the finished clip.">Jump-cut compression</label>
                <select id="sel-jump-cuts" onchange="onOriginalityChange()">
                    <option value="off" selected>Off</option>
                    <option value="gaps">Silence only (safe)</option>
                    <option value="on">Smart + silence</option>
                </select>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-tts-vo" onchange="onOriginalityChange()">
                <label for="chk-tts-vo" title="Mix a Piper (local) voiceover line generated during vision enrichment.">Voiceover (TTS)</label>
            </div>

            <hr class="section-divider">

            <div class="control-group" style="width: 100%;">
                <label class="field-label">Music bed</label>
                <div style="display: flex; gap: 8px;">
                    <input type="text" id="inp-music-bed" placeholder="Empty = off"
                           style="flex: 1;" onchange="onOriginalityChange()">
                    <button class="btn-secondary" onclick="browseMusicFolder()">Browse</button>
                </div>
            </div>

            <div class="checkbox-group" style="margin-top: 10px;">
                <input type="checkbox" id="chk-music-tier-c" onchange="onOriginalityChange()">
                <label for="chk-music-tier-c" title="librosa-scored matching (tempo/energy/brightness). Run Scan Music once first.">Tier C music matching</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-style-profiles" onchange="onOriginalityChange()">
                <label for="chk-style-profiles" title="Per-category editing profiles: zoom punches, freeze frames, slow-mo, meme cutaways, B-roll, SFX, kinetic captions + audio/container fingerprinting. Reads assets under assets/. Off by default.">AI editing profiles</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk-cold-open" onchange="onOriginalityChange()">
                <label for="chk-cold-open" title="Cold-open teaser: prepend a ~1-2s tease of the run-up to the payoff, then a whoosh + white flash into the clip (tease, don't spoil). Stage 7 post-step; keeps the original clip if the teaser can't be built. Off by default.">Cold-open teaser</label>
            </div>

            <div style="display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center;">
                <button id="btn-scan-music" class="btn-secondary btn-sm"
                        onclick="scanMusicLibrary()">Scan Music</button>
                <button id="btn-scan-libraries" class="btn-secondary btn-sm"
                        onclick="scanLibraries()">Scan Libraries</button>
                <span id="music-scan-status"
                      style="font-size: 11px; color: var(--text-dim);"></span>
                <span id="libraries-scan-status"
                      style="font-size: 11px; color: var(--text-dim);"></span>
            </div>
        </div>
    </div>

    <!-- AI Models -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">AI Models</span>
            <button id="btn-refresh-models" class="btn-ghost btn-sm">Refresh</button>
        </div>
        <div class="panel-body" id="models-panel">
            <div class="models-grid" id="models-grid">
                <div class="empty-state">Loading…</div>
            </div>
            <div id="models-save-bar" class="models-save-bar" style="display: none;">
                <span id="models-change-summary" class="models-change-text"></span>
                <button id="btn-save-models" class="btn-primary btn-sm">Save</button>
            </div>
        </div>
    </div>

    <!-- Hardware -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Hardware</span>
            <button id="btn-refresh-hardware" class="btn-ghost btn-sm">Refresh</button>
        </div>
        <div class="panel-body">
            <div id="hardware-grid" class="models-grid">
                <div class="empty-state">Loading…</div>
            </div>
            <div id="hardware-save-bar" class="models-save-bar" style="display: none;">
                <span id="hardware-change-summary" class="models-change-text"></span>
                <button id="btn-save-hardware" class="btn-primary btn-sm">Save</button>
            </div>
            <div id="hardware-restart-notice" class="hardware-restart-notice" style="display: none;">
                <div class="hardware-restart-title">Restart required</div>
                <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px;">
                    <button id="btn-restart-services" class="btn-primary btn-sm">Restart Services</button>
                    <span id="hardware-restart-status"
                          style="font-size: 11px; color: var(--text-muted);"></span>
                </div>
                <div class="hardware-restart-cmd" id="hardware-restart-cmd"></div>
            </div>
        </div>
    </div>

    <!-- Folder Settings -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Folder Settings</span>
            <button id="btn-refresh-folders" class="btn-ghost btn-sm">Refresh</button>
        </div>
        <div class="panel-body" id="folders-panel">
            <div class="empty-state">Loading…</div>
        </div>
    </div>

    <!-- Asset Cache -->
    <div class="panel">
        <div class="panel-header">
            <span class="panel-title">Asset Cache</span>
            <button id="btn-refresh-assets" class="btn-ghost btn-sm"
                    onclick="fetchAssets()">Refresh</button>
        </div>
        <div class="panel-body" id="assets-panel">
            <div class="empty-state">Loading…</div>
        </div>
        <div class="panel-body" style="border-top: 1px solid var(--border); padding-top: 14px;">
            <div class="controls">
                <div class="control-group" style="flex: 1; min-width: 160px;">
                    <label class="field-label">Fetch Whisper</label>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="inp-asset-whisper" value="large-v3" style="flex: 1;">
                        <button class="btn-secondary btn-sm" onclick="fetchAsset('whisper')">Fetch</button>
                    </div>
                </div>
                <div class="control-group" style="flex: 1; min-width: 160px;">
                    <label class="field-label">Fetch Piper</label>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="inp-asset-piper" value="en_US-amy-low" style="flex: 1;">
                        <button class="btn-secondary btn-sm" onclick="fetchAsset('piper')">Fetch</button>
                    </div>
                </div>
            </div>
            <span id="assets-fetch-status"
                  style="display: block; margin-top: 10px; font-size: 11px; color: var(--text-dim);"></span>
        </div>
    </div>

    <!-- Pipeline Monitor -->
    <div class="panel" style="grid-column: 1 / -1">
        <div class="panel-header">
            <span class="panel-title">Pipeline Monitor</span>
        </div>
        <div class="panel-body">
            <div class="stage-track">
                <div id="stage-1" class="stage-dot" title="Discovery"></div>
                <div id="stage-2" class="stage-dot" title="Transcription"></div>
                <div id="stage-3" class="stage-dot" title="Segments"></div>
                <div id="stage-4" class="stage-dot" title="Moments"></div>
                <div id="stage-5" class="stage-dot" title="Frames"></div>
                <div id="stage-6" class="stage-dot" title="Vision"></div>
                <div id="stage-7" class="stage-dot" title="Render"></div>
                <div id="stage-8" class="stage-dot" title="Summary"></div>
            </div>
            <div id="stage-label" class="stage-label">No pipeline running</div>
            <div id="log-viewer" class="log-viewer"></div>
            <div id="stage-history" class="stage-history"></div>
        </div>
    </div>

    <!-- Clips Gallery -->
    <div class="panel" style="grid-column: 1 / -1">
        <div class="panel-header">
            <span class="panel-title">Clips Gallery</span>
            <button id="btn-refresh-clips" class="btn-ghost btn-sm">Refresh</button>
        </div>
        <div class="panel-body">
            <div id="clips-grid" class="clips-grid">
                <div class="empty-state">No clips yet</div>
            </div>
        </div>
    </div>

</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>

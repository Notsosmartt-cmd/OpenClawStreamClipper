x-ollama-base: &ollama-base
  image: ollama/ollama:latest
  volumes:
    - ollama_data:/root/.ollama
  environment:
    - OLLAMA_HOST=0.0.0.0
    - OLLAMA_KEEP_ALIVE=5m
    - OLLAMA_CONTEXT_LENGTH=32768
    - OLLAMA_MAX_LOADED_MODELS=1
    - OLLAMA_FLASH_ATTENTION=1
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "ollama list || exit 1"]
    interval: 60s
    timeout: 10s
    retries: 10
    start_period: 60s

x-clipper-base: &clipper-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - ./config:/root/.openclaw
    - ./workspace:/root/.openclaw/workspace
    - ./vods:/root/VODs
    - ./clips:/root/VODs/Clips_Ready
  environment:
    - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
  restart: unless-stopped

services:
  # ---- GPU profile ----
  ollama-gpu:
    <<: *ollama-base
    container_name: ollama-gpu
    profiles: ["gpu"]
    networks:
      clipper-net:
        aliases:
          - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  stream-clipper-gpu:
    <<: *clipper-base
    container_name: stream-clipper-gpu
    profiles: ["gpu"]
    ports:
      - "5000:5000"
    depends_on:
      ollama-gpu:
        condition: service_healthy
    networks:
      clipper-net:
        aliases:
          - stream-clipper
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---- CPU profile ----
  ollama-cpu:
    <<: *ollama-base
    container_name: ollama-cpu
    profiles: ["cpu"]
    networks:
      clipper-net:
        aliases:
          - ollama

  stream-clipper-cpu:
    <<: *clipper-base
    container_name: stream-clipper-cpu
    profiles: ["cpu"]
    ports:
      - "5000:5000"
    depends_on:
      ollama-cpu:
        condition: service_healthy
    networks:
      clipper-net:
        aliases:
          - stream-clipper

volumes:
  ollama_data:

networks:
  clipper-net:
    driver: bridge
